spring:
  ai:
    dashscope:
      # 在本机复制为 application-local.yml 后填写
      api-key: ${DASHSCOPE_API_KEY:}

  datasource:
    # 在本机复制为 application-local.yml 后填写
    url: ${DB_URL:jdbc:h2:mem:career_ai;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

search-api:
  api-key: ${SEARCH_API_KEY:}

app:
  security:
    api-key: ${APP_API_KEY:}

