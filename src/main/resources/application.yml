spring:
  application :
    name: career-planning-agent
  config:
    import: optional:classpath:application-local.yml
  sql:
    init:
      mode: never
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          timeout: 300s  # 增加到5分钟
      embedding:
        options:
          timeout: 300s  # 增加到5分钟
      connection:
        timeout: 120s    # 连接超时2分钟
        read-timeout: 300s  # 读取超时5分钟
    retry:
      max-attempts: 5     # 最大重试5次
      backoff:
        initial-interval: 2000  # 初始间隔2秒
        max-interval: 10000     # 最大间隔10秒
        multiplier: 2           # 间隔倍数
    mcp:
      client:
        enabled: false

  datasource:
      url: ${DB_URL:jdbc:h2:mem:career_ai;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
      username: ${DB_USERNAME:sa}
      password: ${DB_PASSWORD:}
      driver-class-name: ${DB_DRIVER:org.h2.Driver}


  vectorstore:
      pgvector:
          index-type: HNSW
          dimensions: 1536
          distance-type: COSINE_DISTANCE
          max-document-batch-size: 10000


server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.johan.careerplanningagent.controller


# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


#searchAPI
search-api:
  api-key: ${SEARCH_API_KEY:}

app:
  security:
    enabled: false
    api-key: ${APP_API_KEY:}
  rag:
    pgvector-enabled: ${APP_RAG_PGVECTOR_ENABLED:false}
    use-pgvector: ${APP_RAG_USE_PGVECTOR:false}
    cloud-enabled: false
