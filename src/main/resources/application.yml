spring:
  application :
    name: career-planning-agent
  ai:
    dashscope:
      api-key: sk-206d8cbf57924a53b43500f874cc3a3d
      chat:
        options:
          timeout: 300s  # 增加到5分钟
      embedding:
        options:
          timeout: 300s  # 增加到5分钟
      connection:
        timeout: 120s    # 连接超时2分钟
        read-timeout: 300s  # 读取超时5分钟
    retry:
      max-attempts: 5     # 最大重试5次
      backoff:
        initial-interval: 2000  # 初始间隔2秒
        max-interval: 10000     # 最大间隔10秒
        multiplier: 2           # 间隔倍数
    mcp:
      client:
        enabled: false

  datasource:
      url: jdbc:postgresql://rm-cn-x684rbtcx0002lco.rwlb.rds.aliyuncs.com:5432/career_ai_agent
      username: my_user
      password: "@qazwsxedc123A"


  vectorstore:
      pgvector:
          index-type: HNSW
          dimensions: 1536
          distance-type: COSINE_DISTANCE
          max-document-batch-size: 10000


server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.johan.careerplanningagent.controller


# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


#searchAPI
search-api:
  api-key: ${SEARCH_API_KEY:}

app:
  security:
    enabled: false
    api-key: ${APP_API_KEY:}
  rag:
    cloud-enabled: false